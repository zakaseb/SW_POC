services:
  api:
    build: .
    container_name: sw-poc-api
    command: python -m uvicorn core.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - .env
    volumes:
      - ./models:/app/models
      - ./document_store:/app/document_store
      - ./users.db:/app/users.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  streamlit:
    build: .
    container_name: sw-poc-streamlit
    command: streamlit run rag_deep.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "8501:8501"
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - .env
    volumes:
      - ./models:/app/models
      - ./document_store:/app/document_store
      - ./users.db:/app/users.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api
    restart: unless-stopped
